services:
  database:
    container_name: qernel_database_test
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qernel_test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d ${POSTGRES_DB:-qernel_test} -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - qernel_network_test
    ports:
      - '${POSTGRES_PORT:-5433}:5432'

networks:
  qernel_network_test:
    name: qernel_network_test
