services:
  ###
  # apps
  ###

  api:
    build:
      context: ../
      dockerfile: ./build/package/api/Dockerfile.development
    container_name: qernel_api_dev
    depends_on:
      database:
        condition: service_healthy
      model:
        condition: service_healthy
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      API_RELOAD: ${API_RELOAD:-true}
      APP_TITLE: ${APP_TITLE:-Qernel}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      GITHUB_SCOPE: ${GITHUB_SCOPE}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      MODEL: ${MODEL:-llama3.1:8b}
      MODEL_API_KEY: ${MODEL_API_KEY}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-http://model:11434}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-ollama}
      POSTGRES_DB: ${POSTGRES_DB:-qernel}
      POSTGRES_HOST: ${POSTGRES_HOST:-database}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_HOST: ${REDIS_HOST:-session}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-redis}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
    image: kieranroneill/qernel-api:development
    networks:
      - qernel_network_dev
    ports:
      - '3000:3000'
    volumes:
      - ../.workspace:/app/.workspace:cached
      - ../alembic.ini:/app/alembic.ini:cached
      - ../api:/app/api:cached
      - ../migrations:/app/migrations:cached
      - ../pyproject.toml:/app/pyproject.toml:cached
      - ../registry:/app/registry:cached

  ###
  # models
  ###

  model:
    build:
      context: ../
      dockerfile: ./build/package/model/Dockerfile.development
    container_name: qernel_model_dev
    environment:
      MODEL: ${MODEL:-llama3.1:8b}
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:11434/api/tags']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    image: kieranroneill/qernel-model:development
    networks:
      - qernel_network_dev
    ports:
      - '11434:11434'
    volumes:
      - ../.model:/root/.ollama

  ###
  # storage
  ###

  create_migrations:
    command: sh -lc "pip install --no-cache-dir -r dev-requirements.txt && alembic revision --autogenerate -m \"$MESSAGE\""
    container_name: qernel_create_migrations_dev
    depends_on:
      database:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qernel}
      POSTGRES_HOST: ${POSTGRES_HOST:-database}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    image: python:3.11-slim
    networks:
      - qernel_network_dev
    volumes:
      - ../alembic.ini:/app/alembic.ini:ro
      - ../api:/app/api:ro
      - ../migrations:/app/migrations:cached
      - ../dev-requirements.txt:/app/dev-requirements.txt:ro
    working_dir: /app

  database:
    container_name: qernel_database_dev
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qernel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d ${POSTGRES_DB:-qernel} -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - qernel_network_dev
    ports:
      - '5432:5432'
    volumes:
      - ../.database:/var/lib/postgresql/data

  session:
    build:
      context: ../
      dockerfile: ./build/package/session/Dockerfile
    container_name: qernel_session_dev
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      REDIS_USERNAME: ${REDIS_USERNAME:-redis}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli --user ${REDIS_USERNAME:-redis} --pass ${REDIS_PASSWORD:-password} ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - qernel_network_dev
    ports:
      - '6379:6379'

networks:
  qernel_network_dev:
    name: qernel_network_dev
